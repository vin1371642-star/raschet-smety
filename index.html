<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Расчёт сметы">
<link id="appTouchIcon" rel="apple-touch-icon" href="">
<link id="appFavicon" rel="icon" href="">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="theme-color" content="#0d6efd">
<title>Расчёт сметы на отделку</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:#f0f2f5;color:#212529}
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:#0d6efd;color:#fff;padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top, 0px));display:flex;align-items:center;gap:10px}
.nav h1{font-size:17px;font-weight:700;flex:1}
.nav .btn-nav{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;font-size:14px;cursor:pointer}
.nav .btn-nav:active{background:rgba(255,255,255,.35)}
.btn-back{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:15px;font-weight:600;cursor:pointer;line-height:1;padding:9px 14px 9px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:3px;-webkit-tap-highlight-color:transparent}
.btn-back:active{background:rgba(255,255,255,.3)}
.btn-back .chev{font-size:20px;line-height:1}

/* ── CARDS ── */
.container{padding:12px}
.card{background:#fff;border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-header{background:#f8f9fa;padding:10px 14px;font-weight:600;font-size:14px;border-bottom:1px solid #e9ecef}
.card-body{padding:12px 14px}

/* ── FORMS ── */
.form-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:130px}
.field.sm{min-width:80px;flex:0 0 calc(50% - 4px)}
label{font-size:12px;color:#666;font-weight:500}
input,select,textarea{border:1.5px solid #dee2e6;border-radius:8px;padding:9px 10px;font-size:15px;width:100%;background:#fff;color:#212529;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:#0d6efd;box-shadow:0 0 0 3px rgba(13,110,253,.15)}
.dims-row{display:flex;flex-wrap:wrap;gap:6px}
.dim-field{flex:1 1 80px;min-width:78px}
.dim-field label{font-size:11px;white-space:nowrap}
.dim-field input{font-size:14px;padding:7px 6px;text-align:center}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:4px}
.btn-primary{background:#0d6efd;color:#fff}
.btn-primary:active{background:#0b5ed7}
.btn-danger{background:#dc3545;color:#fff}
.btn-outline{background:#fff;color:#0d6efd;border:2px solid #0d6efd}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;border-radius:8px}

/* ── LOGIN ── */
#screen-login{background:#0d6efd;align-items:center;justify-content:center}
#screen-login.active{display:flex}
.login-box{background:#fff;border-radius:20px;padding:32px 24px;width:90%;max-width:360px;text-align:center}
.login-box h2{font-size:22px;margin-bottom:6px}
.login-box p{color:#666;font-size:14px;margin-bottom:24px}
.login-box input{font-size:16px}
.login-error{color:#dc3545;font-size:13px;margin-top:8px;display:none}

/* ── LIST ── */
.est-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;-webkit-tap-highlight-color:transparent}
.est-card:active{background:#f8f9fa}
.est-card .name{font-weight:700;font-size:16px}
.est-card .meta{font-size:13px;color:#666;margin:2px 0 8px}
.est-card .total{font-size:18px;font-weight:700;color:#198754}
.est-card .no{font-size:12px;color:#aaa}
.empty{text-align:center;padding:60px 20px;color:#999}
.empty p{font-size:16px;margin-bottom:16px}

/* ── WORK ITEMS ── */
.cat-header{background:#e9ecef;padding:8px 14px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#555}
.wi-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f0f2f5;transition:background .15s}
.wi-row:last-child{border-bottom:none}
.wi-row:has(.wi-check:checked){background:#e7f3ff}
.wi-check{display:none}
.wi-box{width:24px;height:24px;flex-shrink:0;border:2px solid #adb5bd;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:#fff}
.wi-check:checked+.wi-box{background:#0d6efd;border-color:#0d6efd}
.wi-check:checked+.wi-box::after{content:'✓';color:#fff;font-size:15px;font-weight:900;line-height:1}
.wi-name{flex:1;font-size:14px;line-height:1.3}
.wi-note{font-size:11px;color:#888;line-height:1.2}
.wi-price{font-size:12px;color:#888;white-space:nowrap;transition:color .15s}
.wi-row:has(.wi-check:checked) .wi-price{color:#0d6efd;font-weight:700}
.wi-qty{width:62px;flex-shrink:0;padding:6px 8px;font-size:14px;text-align:center}
.wi-cpick{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:5px}
.cpick-label{font-size:12px;color:#6c757d;margin-right:2px;white-space:nowrap}
.wi-cbadge{display:none}
.wi-cbadge.up,.wi-cbadge.down{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:700;line-height:1.6;white-space:nowrap}
.wi-cbadge.up{background:#ffc107;color:#222}
.wi-cbadge.down{background:#198754;color:#fff}
.wi-color,.wi-color-b,.wi-color-c{width:auto!important;padding:3px 6px!important;font-size:12px!important;-webkit-appearance:auto!important;border:1.5px solid #dee2e6;border-radius:6px;background:#fff}
.wi-color-other{display:inline-block;width:118px;padding:3px 8px;font-size:12px;border:1.5px solid #dee2e6;border-radius:6px;background:#fff}
.no-print{}
@media print{
  .no-print,#screen-login,#screen-list,#screen-form,#screen-view{display:none!important}
  #screen-pdf{display:block!important}
  .screen{display:block!important}
  body{background:#fff}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}
}

/* ── TOTALS ── */
.total-row{display:flex;justify-content:space-between;padding:6px 0;font-size:15px}
.total-row.big{font-size:18px;font-weight:700;color:#198754;border-top:2px solid #dee2e6;padding-top:10px;margin-top:6px}
.total-row.disc{color:#dc3545}

/* ── STICKY FORM BAR ── */
.form-total-bar{position:fixed;bottom:0;left:0;right:0;background:#198754;color:#fff;display:none;justify-content:space-between;align-items:center;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));z-index:99;font-size:17px;font-weight:700;box-shadow:0 -2px 12px rgba(0,0,0,.2)}
.form-total-bar span{font-size:14px;opacity:.85;font-weight:400}
.form-bar-active{padding-bottom:72px}

/* ── VIEW ── */
.view-table{width:100%;border-collapse:collapse;font-size:13px}
.view-table th{background:#f8f9fa;padding:8px 10px;text-align:left;font-size:12px;font-weight:600;color:#555}
.view-table td{padding:8px 10px;border-bottom:1px solid #f0f2f5}
.view-table tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600}
.badge-info{background:#cff4fc;color:#055160}

/* ── ТЁМНАЯ ТЕМА ── */
html[data-theme="dark"] body{background:#15181d;color:#e4e6eb}
html[data-theme="dark"] .card{background:#1f242b;box-shadow:0 1px 4px rgba(0,0,0,.4)}
html[data-theme="dark"] .card-header{background:#262c34;border-bottom-color:#333a44;color:#e4e6eb}
html[data-theme="dark"] label{color:#9aa3af}
html[data-theme="dark"] input,
html[data-theme="dark"] select,
html[data-theme="dark"] textarea{background:#262c34;color:#e4e6eb;border-color:#3a424d}
html[data-theme="dark"] .est-card{background:#1f242b;box-shadow:0 1px 4px rgba(0,0,0,.4)}
html[data-theme="dark"] .est-card:active{background:#262c34}
html[data-theme="dark"] .est-card .meta,
html[data-theme="dark"] .wi-price{color:#9aa3af}
html[data-theme="dark"] .cat-header{background:#262c34;color:#aab2bd}
html[data-theme="dark"] .wi-row{border-bottom-color:#2a313a}
html[data-theme="dark"] .wi-row:has(.wi-check:checked){background:#1d2a3a}
html[data-theme="dark"] .wi-box{background:#262c34;border-color:#3a424d}
html[data-theme="dark"] .view-table th{background:#262c34;color:#aab2bd}
html[data-theme="dark"] .view-table td{border-bottom-color:#2a313a}
html[data-theme="dark"] .total-row{color:#e4e6eb}
html[data-theme="dark"] .empty{color:#7a828c}
html[data-theme="dark"] .form-total-bar{background:#1f242b;color:#e4e6eb;border-top:1px solid #333a44}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <img class="app-logo" alt="Ростовские окна" style="max-width:220px;width:100%;margin-bottom:10px;display:none">
    <h2 id="loginTitle">Расчёт сметы на отделку</h2>
    <p>Расчёт сметы на отделку</p>
    <div style="position:relative;margin-bottom:12px">
      <input type="password" id="loginPass" placeholder="Пароль" autocomplete="current-password" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" style="width:100%;font-size:16px;padding:10px 44px 10px 12px;border:1.5px solid #dee2e6;border-radius:10px;outline:none">
      <button type="button" onclick="var f=document.getElementById('loginPass');f.type=f.type==='password'?'text':'password';this.textContent=f.type==='password'?'👁':'🙈'" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer;padding:0;line-height:1">👁</button>
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Войти</button>
    <div class="login-error" id="loginErr">Неверный пароль</div>
  </div>
</div>

<!-- ═══ LIST ═══ -->
<div id="screen-list" class="screen">
  <div class="nav">
    <img class="app-logo" alt="" style="height:30px;background:#fff;border-radius:6px;padding:4px 7px;margin-right:8px;display:none">
    <h1>Сметы</h1>
    <button class="btn-nav" id="themeToggle" onclick="toggleTheme()" style="margin-right:4px" title="Тема">🌙</button>
    <button class="btn-nav" onclick="showForm(null)">+ Новая</button>
  </div>
  <div class="container">
    <input type="search" id="estSearch" placeholder="🔍 Поиск: клиент, № договора, № обращения" autocomplete="off" oninput="renderList()" style="margin-bottom:10px">
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn btn-outline btn-sm" style="flex:1" onclick="exportBackup()">💾 Сохранить копию</button>
      <button class="btn btn-outline btn-sm" style="flex:1" onclick="document.getElementById('importFile').click()">📁 Восстановить</button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importBackup(this)">
    </div>
    <div id="listContainer"></div>
  </div>
</div>

<!-- ═══ FORM ═══ -->
<div id="screen-form" class="screen">
  <div class="nav">
    <button class="btn-back" onclick="showList()"><span class="chev">‹</span> Назад</button>
    <h1 id="formTitle">Новая смета</h1>
    <button class="btn-nav" onclick="saveEstimate()">Сохранить</button>
  </div>
  <div class="container">

    <!-- Клиент -->
    <div class="card">
      <div class="card-header">Данные клиента</div>
      <div class="card-body">
        <div class="form-row">
          <div class="field sm"><label>№ обращения</label><input id="fAppeal" type="text" placeholder="152"></div>
          <div class="field sm"><label>№ договора</label><input id="fContract" type="text" placeholder="19827"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>ФИО клиента</label><input id="fClient" type="text" placeholder="Иванов Иван Иванович"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>Дата</label>
            <input id="fDate" type="date">
          </div>
        </div>
      </div>
    </div>

    <!-- Параметры -->
    <div class="card">
      <div class="card-header">Параметры балкона, м</div>
      <div class="card-body">
        <div class="dims-row">
          <div class="dim-field"><label>Длина</label><input id="dA" type="number" step="0.01" placeholder="3.48" oninput="recalcForm()"></div>
          <div class="dim-field"><label>Ширина</label><input id="dB" type="number" step="0.01" placeholder="1.15" oninput="recalcForm()"></div>
          <div class="dim-field"><label>Перила</label><input id="dD" type="number" step="0.01" placeholder="1.30" oninput="recalcForm()"></div>
          <div class="dim-field"><label>Высота</label><input id="dC" type="number" step="0.01" placeholder="2.65" oninput="recalcForm()"></div>
          <div class="dim-field"><label>Выс.ББ</label><input id="dE" type="number" step="0.01" placeholder="2.16" oninput="recalcForm()"></div>
          <div class="dim-field"><label>Шир.ББ</label><input id="dK" type="number" step="0.01" placeholder="1.56" oninput="recalcForm()"></div>
          <div class="dim-field"><label>Подъём кровли</label><input id="dL" type="number" step="0.01" placeholder="0.30" oninput="recalcForm()"></div>
          <div class="dim-field"><label>Вынос вперёд</label><input id="dM" type="number" step="0.01" placeholder="0.00" oninput="recalcForm()"></div>
          <div class="dim-field"><label>Вынос влево</label><input id="dN" type="number" step="0.01" placeholder="0.00" oninput="recalcForm()"></div>
          <div class="dim-field"><label>Вынос вправо</label><input id="dP" type="number" step="0.01" placeholder="0.00" oninput="recalcForm()"></div>
        </div>
      </div>
    </div>

    <!-- Работы -->
    <div class="card">
      <div class="card-header">Состав работ</div>
      <div id="wiList"></div>
    </div>

    <!-- Скидка -->
    <div class="card">
      <div class="card-header">Скидка</div>
      <div class="card-body">
        <div class="form-row">
          <div class="field sm"><label>Скидка %</label><input id="fDiscPct" type="number" min="0" max="100" value="0" oninput="recalcForm()"></div>
          <div class="field sm"><label>Скидка руб.</label><input id="fDiscRub" type="number" min="0" value="0" oninput="recalcForm()"></div>
        </div>
      </div>
    </div>

    <!-- Итого -->
    <div class="card">
      <div class="card-header">Итого</div>
      <div class="card-body">
        <div class="total-row"><span>Стоимость клиенту:</span><span id="fTotalClient">—</span></div>
        <div class="total-row disc" id="fDiscRow" style="display:none"><span>Скидка:</span><span id="fDiscAmt">—</span></div>
        <div class="total-row big"><span>К оплате:</span><span id="fTotalFinal">—</span></div>
      </div>
    </div>

    <!-- Примечание -->
    <div class="card">
      <div class="card-header">Примечание</div>
      <div class="card-body">
        <textarea id="fNotes" rows="3" style="resize:none;width:100%;border:1.5px solid #dee2e6;border-radius:8px;padding:9px 10px;font-size:14px" placeholder="Дополнительная информация..."></textarea>
      </div>
    </div>

  </div>
</div>

<!-- ═══ VIEW ═══ -->
<div id="screen-view" class="screen">
  <div class="nav">
    <button class="btn-back" onclick="showList()"><span class="chev">‹</span> Назад</button>
    <h1 id="viewTitle">Смета</h1>
    <button class="btn-nav" onclick="showPdf()" style="margin-right:4px">📄 PDF</button>
    <button class="btn-nav" onclick="editCurrent()">Изменить</button>
  </div>
  <div class="container" id="viewContainer"></div>
</div>

<!-- ═══ PDF ═══ -->
<div id="screen-pdf" class="screen">
  <div class="nav no-print">
    <button class="btn-back" onclick="showView(currentId)"><span class="chev">‹</span> Назад</button>
    <h1>Предпросмотр</h1>
    <button class="btn-nav" onclick="sendPdf()" style="margin-right:4px">📤 Смета</button>
    <button class="btn-nav" onclick="sendInvoice(this)" style="margin-right:4px">🧾 Накл.</button>
    <button class="btn-nav" onclick="shareText()">💬 Текст</button>
  </div>
  <div class="container" id="pdfContainer"></div>
</div>

<!-- Sticky total bar (вне экранов, управляется JS) -->
<div class="form-total-bar" id="formBar">
  <span>К оплате:</span>
  <span id="formBarTotal">—</span>
</div>

    if (lm  !== null) return lm;
    if (pcs !== null) return pcs;
    return 0;
  }
  if (pcs !== null) return pcs;
  if (lm  !== null) return lm;
  return 0;
}

// Округление до копеек — как round(x, 2) в Python (formula_eval.py)
function round2(x) { return Math.round((Number(x) || 0) * 100) / 100; }

function calcFormulaClient(wiId, dims) {
  const mats = ITEM_MATERIALS[wiId];
  if (!mats || !mats.length) return null;
  // Матчит formula_eval.item_formula_cost: каждый материал округляется до копеек,
  // затем сумма округляется до копеек (а НЕ до целого рубля).
  let total = 0;
  for (const m of mats) {
    const qty = calcItemQty(m.fpcs, m.flm, m.unit, dims);
    total += round2(qty * m.price * (1 + m.markup));
  }
  return round2(total);
}

function getDims() {
  const g = id => parseFloat(document.getElementById(id)?.value) || 0;
  return {A:g('dA'),B:g('dB'),C:g('dC'),D:g('dD'),E:g('dE'),K:g('dK'),L:g('dL'),M:g('dM'),N:g('dN'),P:g('dP')};
}

function getItemClientPrice(wi, dims) {
  if (ITEM_MATERIALS[wi.id]) {
    // Запускаем формулу при наличии ЛЮБОГО размера (а не только A/B/C/D),
    // иначе откосы (E,K) и кровля (L) считались бы по снимку станд. размеров.
    if (dims && (dims.A || dims.B || dims.C || dims.D || dims.E || dims.K || dims.L || dims.M || dims.N || dims.P)) {
      const v = calcFormulaClient(wi.id, dims);
      if (v !== null) return v;
    }
    return wi.cp || 0;
  }
  // Фикс. позиция: используем индивидуальный markup_override (wi.mk), иначе глобальный MARKUP.
  const mk = (wi.mk != null) ? wi.mk : MARKUP;
  return round2(wi.price * (1 + mk));
}

// Множитель цвета — матчит app.py get_color_multiplier (точное совпадение → wildcard '*' → 1.0)
function getColorMult(itemId, colorA) {
  if (!colorA) return 1.0;
  const rules = COLOR_RULES[String(itemId)] || [];
  let wildcard = 1.0;
  for (const r of rules) {
    if (r.k === colorA) return r.m;
    if (r.k === '*') wildcard = r.m;
  }
  return wildcard;
}

// Цена за единицу С учётом цвета, округлённая до копеек — матчит compute_item_cost.
function getItemUnitPrice(wi, it, dims) {
  const base = getItemClientPrice(wi, dims);
  const mult = getColorMult(it.id, it.color);
  return mult !== 1.0 ? round2(base * mult) : base;
}

// Итог строки = цена_ед(с цветом) × qty, округление до копеек — матчит client_total.
function getItemLineTotal(wi, it, dims) {
  return round2(getItemUnitPrice(wi, it, dims) * (it.qty || 1));
}

let currentId = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const bar = document.getElementById('formBar');
  if (bar) bar.style.display = (id === 'screen-form') ? 'flex' : 'none';
  window.scrollTo(0,0);
}

function showList() {
  renderList();
  showScreen('screen-list');
}

function showForm(est) {
  currentId = est ? est.id : null;
  document.getElementById('formTitle').textContent = est ? 'Редактировать' : 'Новая смета';

  // Заполняем поля
  document.getElementById('fAppeal').value   = est?.appeal_no   || '';
  document.getElementById('fContract').value = est?.contract_no || '';
  document.getElementById('fClient').value   = est?.client_name || '';
  document.getElementById('fDate').value     = est?.date ? toInputDate(est.date) : new Date().toISOString().slice(0,10);
  document.getElementById('fNotes').value    = est?.notes || '';
  document.getElementById('fDiscPct').value  = est?.discount_pct || 0;
  document.getElementById('fDiscRub').value  = est?.discount_rub || 0;

  const d = est?.dims || {};
  ['A','B','C','D','E','K','L','M','N','P'].forEach(v => {
    document.getElementById('d'+v).value = d[v] != null ? d[v] : '';
  });

  renderWIList(est?.items || []);
  recalcForm();
  showScreen('screen-form');
}

function showView(id) {
  currentId = id;
  const est = load().find(e => e.id === id);
  if (!est) return showList();
  renderView(est);
  showScreen('screen-view');
}

function editCurrent() {
  const est = load().find(e => e.id === currentId);
  if (est) showForm(est);
}

function doLogin() {
  const pass = document.getElementById('loginPass').value.trim().toLowerCase();
  const err  = document.getElementById('loginErr');
  if (PASSWORDS.includes(pass)) {
    err.style.display = 'none';
    showList();
  } else {

    document.getElementById('loginPass').value = '';
  }
}

});

// ══════════════════════════════════════════════
function renderList() {
  let estimates = load().sort((a,b) => b.id - a.id);
  const el = document.getElementById('listContainer');
  if (!estimates.length) {
    el.innerHTML = '<div class="empty"><p>Смет пока нет</p><button class="btn btn-primary" onclick="showForm(null)" style="width:auto;padding:12px 28px">+ Создать первую</button></div>';
    return;
  }
  const q = (document.getElementById('estSearch')?.value || '').trim().toLowerCase();
  if (q) {
    estimates = estimates.filter(e =>
      `${e.client_name||''} ${e.contract_no||''} ${e.appeal_no||''} ${e.date||''}`.toLowerCase().includes(q));
  }
  if (!estimates.length) {
    el.innerHTML = '<div class="empty"><p>Ничего не найдено</p></div>';
    return;
  }
  el.innerHTML = estimates.map(e => {
    const totals = calcTotals(e.items, e.discount_pct, e.discount_rub, e.dims);
    return `<div class="est-card" onclick="showView(${e.id})">
      <div class="name">${e.client_name || 'Без имени'}</div>
      <div class="meta">${e.date || ''}${e.contract_no ? ' · Дог. №'+e.contract_no : ''}${e.appeal_no ? ' · Обр. №'+e.appeal_no : ''}</div>
      <div class="total">${fmtRub(totals.final)}</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// СПИСОК РАБОТ В ФОРМЕ
// ══════════════════════════════════════════════
function renderWIList(savedItems) {
  const saved = {};
  savedItems.forEach(i => saved[i.id] = {qty: i.qty || 1, color: i.color || '', colorB: i.colorB || '', colorC: i.colorC || ''});

  const TINTS    = ['светлый', 'темный'];
  const TEXTURES = ['паркет', 'доска'];
  const sp = 'onclick="event.stopPropagation()"';

  function mkOpts(vals, sel) {
    return vals.map(c => `<option value="${c}"${sel === c ? ' selected' : ''}>${c}</option>`).join('');
  }

  const cats = [...new Set(WORK_ITEMS.map(w => w.cat))];
  let html = '';
  cats.forEach(cat => {
    html += `<div class="cat-header">${cat}</div>`;
    WORK_ITEMS.filter(w => w.cat === cat).forEach(w => {
      const isChecked = saved[w.id] != null;
      const checked   = isChecked ? 'checked' : '';
      const qty       = isChecked ? saved[w.id].qty   : 1;
      const colorA    = isChecked ? saved[w.id].color  : '';
      const colorB    = isChecked ? saved[w.id].colorB : '';
      const colorC    = isChecked ? saved[w.id].colorC : '';

      const ct     = getColorType(w);
      const cpShow = isChecked ? 'display:flex' : 'display:none';
      let colorHtml = '';

      if (ct === 'profnastil') {
        const cols  = COLOR_OPTS.profnastil;
        const isCust = colorA && !cols.includes(colorA);
        colorHtml = `<div class="wi-cpick" data-wi-id="${w.id}" style="${cpShow}">
          <small class="cpick-label">Цвет:</small>
          <select class="wi-color" data-id="${w.id}" onchange="onColorChange(this)" ${sp}>
            <option value="">— выбрать —</option>${mkOpts(cols, isCust ? '' : colorA)}
            <option value="__other__"${isCust ? ' selected' : ''}>другое...</option>
          </select>
          <input class="wi-color-other" data-id="${w.id}" value="${isCust ? colorA : ''}" placeholder="укажите цвет" style="${isCust ? '' : 'display:none'}" ${sp} oninput="recalcForm()">
        </div>`;

      } else if (ct === 'pvh') {
        const cols  = COLOR_OPTS.pvh;
        const isCust = colorA && !cols.includes(colorA);
        colorHtml = `<div class="wi-cpick" data-wi-id="${w.id}" style="${cpShow}">
          <small class="cpick-label">Цвет ПВХ:</small>
          <select class="wi-color" data-id="${w.id}" onchange="onColorChange(this)" ${sp}>
            <option value="">— выбрать —</option>${mkOpts(cols, isCust ? '' : colorA)}
            <option value="__other__"${isCust ? ' selected' : ''}>другое...</option>
          </select>
          <input class="wi-color-other" data-id="${w.id}" value="${isCust ? colorA : ''}" placeholder="укажите цвет" style="${isCust ? '' : 'display:none'}" ${sp} oninput="recalcForm()">
        </div>`;

      } else if (ct === 'lino') {
        colorHtml = `<div class="wi-cpick" data-wi-id="${w.id}" style="${cpShow}">
          <small class="cpick-label">Цвет:</small>
          <select class="wi-color" data-id="${w.id}" oninput="recalcForm()" ${sp}>
            <option value="">—</option>${mkOpts(COLOR_OPTS.lino, colorA)}
          </select>
          <select class="wi-color-b" data-id="${w.id}" ${sp}>
            <option value="">— оттенок —</option>${mkOpts(TINTS, colorB)}
          </select>
          <select class="wi-color-c" data-id="${w.id}" ${sp}>
            <option value="">— фактура —</option>${mkOpts(TEXTURES, colorC)}
          </select>
        </div>`;

      } else if (ct === 'lam') {
        colorHtml = `<div class="wi-cpick" data-wi-id="${w.id}" style="${cpShow}">
          <small class="cpick-label">Цвет:</small>
          <select class="wi-color" data-id="${w.id}" oninput="recalcForm()" ${sp}>
            <option value="">—</option>${mkOpts(COLOR_OPTS.lam, colorA)}
          </select>
          <select class="wi-color-b" data-id="${w.id}" ${sp}>
            <option value="">— оттенок —</option>${mkOpts(TINTS, colorB)}
          </select>
        </div>`;

      } else if (ct === 'kv') {
        colorHtml = `<div class="wi-cpick" data-wi-id="${w.id}" style="${cpShow}">
          <small class="cpick-label">Оттенок:</small>
          <select class="wi-color" data-id="${w.id}" oninput="recalcForm()" ${sp}>
            <option value="">— выбрать —</option>${mkOpts(COLOR_OPTS.kv, colorA)}
          </select>
        </div>`;
      }
      // бейдж наценки за цвет (как в EXE) — вставляем последним элементом в .wi-cpick
      if (colorHtml) colorHtml = colorHtml.replace('</div>',
        `<span class="wi-cbadge" data-id="${w.id}"></span></div>`);

      const cpDisplay = getItemClientPrice(w, getDims());
      html += `<div class="wi-row" data-wi-id="${w.id}" onclick="toggleWI(event,${w.id})">
        <input type="checkbox" class="wi-check" id="wic${w.id}" data-id="${w.id}" ${checked} onchange="onWICheck(this)">
        <label class="wi-box" for="wic${w.id}" onclick="event.stopPropagation()"></label>
        <div class="wi-name">${w.name}${w.note ? '<br><small class="wi-note">'+w.note+'</small>' : ''}<br><span class="wi-price">${fmtRub(cpDisplay)} / ${w.unit}</span>${colorHtml}</div>
        ${w.noqty
          ? `<input type="hidden" class="wi-qty" data-id="${w.id}" value="1">`
          : `<input type="number" class="wi-qty" data-id="${w.id}" value="${qty}" min="0.1" step="0.1" oninput="recalcForm()" onclick="event.stopPropagation()">`}
      </div>`;
    });
  });
  document.getElementById('wiList').innerHTML = html;
}

function onWICheck(cb) {
  const id = parseInt(cb.dataset.id);
  const cpick = document.querySelector(`.wi-cpick[data-wi-id="${id}"]`);
  if (cpick) cpick.style.display = cb.checked ? 'flex' : 'none';
  recalcForm();
}

function onColorChange(sel) {
  const cpick = sel.closest('.wi-cpick');
  const other = cpick ? cpick.querySelector('.wi-color-other') : null;
  if (other) other.style.display = sel.value === '__other__' ? 'inline-block' : 'none';
  recalcForm();
}

// Выбранный цвет позиции (с учётом «другое...») — для бейджа наценки
function getColorAValue(id) {
  const sel = document.querySelector(`.wi-color[data-id="${id}"]`);
  if (!sel) return '';
  if (sel.value === '__other__') {
    const o = document.querySelector(`.wi-color-other[data-id="${id}"]`);
    return o ? o.value.trim() : '';
  }
  return sel.value;
}

// Подсветка наценки % за цвет (как в EXE-версии)
function updateColorBadge(id) {
  const badge = document.querySelector(`.wi-cbadge[data-id="${id}"]`);
  if (!badge) return;
  const cb    = document.getElementById('wic' + id);
  const color = getColorAValue(id);
  const pct   = Math.round((getColorMult(id, color) - 1) * 100);
  if (!cb || !cb.checked || !color || pct === 0) {
    badge.textContent = '';
    badge.className = 'wi-cbadge';
    return;
  }
  badge.textContent = (pct > 0 ? '+' : '') + pct + '% цвет';
  badge.className = 'wi-cbadge ' + (pct > 0 ? 'up' : 'down');
}

function refreshColorBadges() {
  document.querySelectorAll('.wi-cbadge').forEach(b =>
    updateColorBadge(parseInt(b.dataset.id)));
}

function toggleWI(e, id) {
  const cb = document.getElementById('wic' + id);
  if (!cb) return;
  cb.checked = !cb.checked;
  const cpick = document.querySelector(`.wi-cpick[data-wi-id="${id}"]`);
  if (cpick) cpick.style.display = cb.checked ? 'flex' : 'none';
  recalcForm();
}

function getCheckedItems() {
  const items = [];
  document.querySelectorAll('.wi-check:checked').forEach(cb => {
    const id      = parseInt(cb.dataset.id);
    const qty     = parseFloat(document.querySelector(`.wi-qty[data-id="${id}"]`).value) || 1;
    const colEl   = document.querySelector(`.wi-color[data-id="${id}"]`);
    const otherEl = document.querySelector(`.wi-color-other[data-id="${id}"]`);
    let color = colEl ? colEl.value : '';
    if (color === '__other__') color = otherEl ? otherEl.value.trim() : '';
    const colorBEl = document.querySelector(`.wi-color-b[data-id="${id}"]`);
    const colorCEl = document.querySelector(`.wi-color-c[data-id="${id}"]`);
    const colorB   = colorBEl ? colorBEl.value : '';
    const colorC   = colorCEl ? colorCEl.value : '';
    items.push({id, qty, color, colorB, colorC});
  });
  return items;
}

// ══════════════════════════════════════════════
// РАСЧЁТ
// ══════════════════════════════════════════════
function calcTotals(items, discPct, discRub, dims) {
  let client = 0;
  items.forEach(it => {
    const wi = WORK_ITEMS.find(w => w.id === it.id);
    if (!wi) return;
    client += getItemLineTotal(wi, it, dims);
  });
  client = round2(client);
  // Скидка: % ИЛИ рубли (приоритет у %), как compute_estimate_totals в calc.py — НЕ суммируем.
  let discAmt = 0;
  if (discPct) discAmt = round2(client * discPct / 100);
  else if (discRub) discAmt = discRub;
  return { client, discAmt, final: round2(Math.max(0, client - discAmt)) };
}

function recalcForm() {
  const dims  = getDims();
  // Авто-qty для откосов (calc_type='slopes'): slopes_qty = E*2 + K + 0.3 (calc.py).
  // SLOPES_IDS заполняется export_mobile_html.py из БД — не хардкодим id.
  if (dims.E && dims.K) {
    const slopesQty = round2(dims.E * 2 + dims.K + 0.3);
    SLOPES_IDS.forEach(sid => {
      document.querySelectorAll(`.wi-qty[data-id="${sid}"]`).forEach(el => { el.value = slopesQty; });
    });
  }
  const items = getCheckedItems();
  const discPct = parseFloat(document.getElementById('fDiscPct').value) || 0;
  const discRub = parseFloat(document.getElementById('fDiscRub').value) || 0;
  // Карта выбранных позиций по id (для отображения цены с учётом цвета)
  const itemMap = {};
  items.forEach(it => { itemMap[it.id] = it; });
  // Обновляем отображаемую цену за единицу (формульные позиции + цена с цветом для отмеченных)
  document.querySelectorAll('.wi-row[data-wi-id]').forEach(row => {
    const wi = WORK_ITEMS.find(w => w.id === parseInt(row.dataset.wiId));
    if (!wi) return;
    const span = row.querySelector('.wi-price');
    if (!span) return;
    const it = itemMap[wi.id];
    if (it) {
      span.textContent = fmtRub(getItemUnitPrice(wi, it, dims)) + ' / ' + wi.unit;
    } else if (ITEM_MATERIALS[wi.id]) {
      span.textContent = fmtRub(getItemClientPrice(wi, dims)) + ' / ' + wi.unit;
    }
  });
  const t = calcTotals(items, discPct, discRub, dims);

  document.getElementById('fTotalClient').textContent = fmtRub(t.client);
  document.getElementById('fTotalFinal').textContent  = fmtRub(t.final);
  const barEl = document.getElementById('formBarTotal');
  if (barEl) barEl.textContent = fmtRub(t.final);
  // padding чтобы контент не скрывался за панелью
  const cont = document.querySelector('#screen-form .container');
  if (cont) cont.classList.add('form-bar-active');
  const discRow = document.getElementById('fDiscRow');
  if (t.discAmt > 0) {
    discRow.style.display = 'flex';
    document.getElementById('fDiscAmt').textContent = '−' + fmtRub(t.discAmt);
  } else {
    discRow.style.display = 'none';
  }
  refreshColorBadges();
}

// ══════════════════════════════════════════════
// СОХРАНЕНИЕ
// ══════════════════════════════════════════════
function saveEstimate() {
  const estimates = load();
  const items = getCheckedItems();
  const est = {
    id:           currentId || Date.now(),
    appeal_no:    document.getElementById('fAppeal').value.trim(),
    contract_no:  document.getElementById('fContract').value.trim(),
    client_name:  document.getElementById('fClient').value.trim(),
    date:         fromInputDate(document.getElementById('fDate').value),
    dims: {
      A: parseFloat(document.getElementById('dA').value)||0,
      B: parseFloat(document.getElementById('dB').value)||0,
      C: parseFloat(document.getElementById('dC').value)||0,
      D: parseFloat(document.getElementById('dD').value)||0,
      E: parseFloat(document.getElementById('dE').value)||0,
      K: parseFloat(document.getElementById('dK').value)||0,
      L: parseFloat(document.getElementById('dL').value)||0,
      M: parseFloat(document.getElementById('dM').value)||0,
      N: parseFloat(document.getElementById('dN').value)||0,
      P: parseFloat(document.getElementById('dP').value)||0,
    },
    items,
    discount_pct: parseFloat(document.getElementById('fDiscPct').value)||0,
    discount_rub: parseFloat(document.getElementById('fDiscRub').value)||0,
    notes:        document.getElementById('fNotes').value.trim(),
  };

  if (currentId) {
    const idx = estimates.findIndex(e => e.id === currentId);
    if (idx >= 0) estimates[idx] = est;
  } else {
    estimates.push(est);
  }
  save(estimates);
  showView(est.id);
}

  ].filter(r => r[1]).map(r =>
    `<tr><td style="color:#555;padding:4px 12px 4px 0;width:130px">${r[0]}</td><td style="padding:4px 0"><b>${r[1]} м</b></td></tr>`

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onloadend = () => res(String(r.result).split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

// Универсальная отправка файла: нативно через Capacitor (надёжно в APK —
// открывает системное «Поделиться»), иначе Web Share / скачивание (браузер, iOS).
async function shareFile(blob, filename, mime, title) {
  const cap = window.Capacitor;
  if (cap && cap.isNativePlatform && cap.isNativePlatform() &&
      cap.Plugins && cap.Plugins.Filesystem && cap.Plugins.Share) {
    const b64 = await blobToBase64(blob);
    const w = await cap.Plugins.Filesystem.writeFile({ path: filename, data: b64, directory: 'CACHE' });
    await cap.Plugins.Share.share({ title: title || filename, url: w.uri, dialogTitle: 'Отправить' });
    return;
  }
  const file = new File([blob], filename, { type: mime });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({ files: [file], title: title || filename });
    return;
  }
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: url, download: filename });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

async function sendPdf() {
  const est = load().find(e => e.id === currentId);
  if (!est) return;
  const title = (est.appeal_no || est.contract_no) ? 'Смета №' + (est.appeal_no || est.contract_no) : 'Смета';
  const pdfBtn = document.querySelector('#screen-pdf .btn-nav');
  const origTxt = pdfBtn ? pdfBtn.textContent : '';
  if (pdfBtn) { pdfBtn.textContent = '⏳'; pdfBtn.disabled = true; }
  try {
    const blob = await buildPdfBlob(est);
    await shareFile(blob, title + '.pdf', 'application/pdf', title);
  } catch (e) {
    alert('Не удалось отправить PDF: ' + (e && e.message ? e.message : e));
  }
  finally { if (pdfBtn) { pdfBtn.textContent = origTxt; pdfBtn.disabled = false; } }
}

async function buildPdfBlob(est, mode) {
  return pagesToPdfBlob(drawEstimate(est, mode));
}

function drawEstimate(est, mode) {
  mode = mode || 'client';
  const isInvoice = mode === 'invoice';
  const S=2,PW=595,PH=842,W=PW*S,H=PH*S,PX=56*S,PY=48*S,CW=W-PX*2;
  const Fh1=`bold ${18*S}px system-ui,sans-serif`,Fh2=`bold ${11*S}px system-ui,sans-serif`,
        Fbody=`${12*S}px system-ui,sans-serif`,Fsm=`${10*S}px system-ui,sans-serif`,
        Fbig=`bold ${14*S}px system-ui,sans-serif`;
  const pages=[];let canvas,ctx,y;

  function pg(){
    canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
    ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    y=PY;pages.push(canvas);
  }
  function chk(n){if(y+n>H-PY)pg();}
  function tx(t,x,yy,f,c,a){
    ctx.font=f;ctx.fillStyle=c||'#212529';ctx.textAlign=a||'left';
    ctx.fillText(t,x,yy);ctx.textAlign='left';
  }
  function hl(yy,c,w){
    ctx.strokeStyle=c||'#dee2e6';ctx.lineWidth=w||1;
    ctx.beginPath();ctx.moveTo(PX,yy);ctx.lineTo(PX+CW,yy);ctx.stroke();
  }
  function wrap(t,f,mw){
    ctx.font=f;
    if(ctx.measureText(t).width<=mw)return[t,''];
    let lo=1,hi=t.length;
    while(lo<hi-1){const m=(lo+hi)>>1;ctx.measureText(t.slice(0,m)).width<=mw?lo=m:hi=m;}
    for(let i=lo;i>=1;i--){if(t[i]===' ')return[t.slice(0,i),t.slice(i+1)];}
    return[t.slice(0,lo),t.slice(lo)];
  }

  pg();
  // Фирменный бланк: текст компании слева, логотип справа
  let _logoBottom = y;
  if(typeof LOGO_IMG!=='undefined' && LOGO_IMG && LOGO_IMG.complete && LOGO_IMG.naturalWidth){
    const lh=28*S, lw=lh*(LOGO_IMG.naturalWidth/LOGO_IMG.naturalHeight);
    try{ ctx.drawImage(LOGO_IMG, PX+CW-lw, y, lw, lh); }catch(e){}
    _logoBottom = y+lh;
  }
  // Название компании + реквизиты (слева)
  if(typeof COMPANY!=='undefined' && COMPANY){tx(COMPANY,PX,y+12*S,Fbig);y+=18*S;}
  if(typeof COMPANY_DETAILS!=='undefined' && COMPANY_DETAILS){
    COMPANY_DETAILS.split('\n').forEach(line=>{if(line.trim()){tx(line.trim(),PX,y+9*S,Fsm,'#666');y+=12*S;}});
  }
  if(_logoBottom>y) y=_logoBottom;  // если логотип ниже текста — выровнять
  if((typeof COMPANY!=='undefined'&&COMPANY)||(typeof COMPANY_DETAILS!=='undefined'&&COMPANY_DETAILS)||_logoBottom>PY){hl(y);y+=14*S;}

  const ttl=isInvoice
    ? ('Накладная №'+(est.contract_no||est.id))
    : ((est.appeal_no||est.contract_no)?'Смета №'+(est.appeal_no||est.contract_no):'Смета');
  tx(ttl,PX,y+18*S,Fh1);
  if(isInvoice){tx('"____" __________ 20__ г.',PX+CW,y+12*S,Fsm,'#666','right');}
  y+=24*S;
  const sub=[est.client_name,est.date,est.contract_no&&'Дог. №'+est.contract_no,
    est.appeal_no&&'Обр. №'+est.appeal_no].filter(Boolean).join('  ·  ');
  if(sub){tx(sub,PX,y+10*S,Fsm,'#666');y+=16*S;}
  hl(y);y+=14*S;

  const d=est.dims||{};
  const dims=[['Длина (A)',d.A],['Ширина (B)',d.B],['Перила (D)',d.D],
    ['Высота (C)',d.C],['Высота ББ (E)',d.E],['Ширина ББ (K)',d.K],['Подъём (L)',d.L]
  ].filter(r=>r[1]);
  if(dims.length){
    tx('Параметры балкона',PX,y+11*S,Fh2,'#555');y+=16*S;
    const cw3=CW/3;
    dims.forEach((r,i)=>{
      const xd=PX+(i%3)*cw3,yd=y+Math.floor(i/3)*15*S;
      tx(r[0]+':',xd,yd+10*S,Fsm,'#888');tx(r[1]+' м',xd+88*S,yd+10*S,Fsm);
    });
    y+=Math.ceil(dims.length/3)*15*S+16*S;hl(y);y+=14*S;
  }

  if(est.items&&est.items.length){
    tx('Состав работ',PX,y+11*S,Fh2,'#555');y+=16*S;
    ctx.fillStyle='#f0f2f5';ctx.fillRect(PX,y,CW,14*S);
    const c1=CW*0.62,c2=CW*0.19;
    tx('Наименование',PX+6*S,y+10*S,Fh2,'#555');
    tx('Кол-во',PX+c1+c2/2,y+10*S,Fh2,'#555','center');
    tx('Сумма',PX+CW-6*S,y+10*S,Fh2,'#555','right');
    y+=14*S;hl(y,'#dee2e6');
    for(const it of est.items){
      const wi=WORK_ITEMS.find(w=>w.id===it.id);if(!wi)continue;
      const itemTot=getItemLineTotal(wi,it,d);
      const tot=fmtRub(itemTot),qty=it.qty+' '+wi.unit;
      const _cp2=[it.color,it.colorB,it.colorC].filter(Boolean);
      const name=wi.name+(_cp2.length?` (${_cp2.join(' / ')})`:'');
      let n1=name,n2='';
      if(ctx.font=Fbody,ctx.measureText(n1).width>c1-12*S)[n1,n2]=wrap(name,Fbody,c1-12*S);
      const rh=n2?32*S:16*S;chk(rh);
      tx(n1,PX+6*S,y+11*S,Fbody);
      if(n2)tx(n2,PX+6*S,y+25*S,Fbody);
      tx(qty,PX+c1+c2/2,y+(n2?19:11)*S,Fsm,'#666','center');
      tx(tot,PX+CW-6*S,y+(n2?19:11)*S,Fbody,'#212529','right');
      y+=rh;hl(y,'#f0f2f5');
    }
    y+=14*S;
  }

  chk(70*S);hl(y,'#adb5bd',2);y+=12*S;
  const t=calcTotals(est.items,est.discount_pct,est.discount_rub,d);
  tx('Стоимость клиенту:',PX,y+12*S,Fbody,'#555');
  tx(fmtRub(t.client),PX+CW,y+12*S,Fbody,'#212529','right');y+=18*S;
  if(t.discAmt>0){
    tx('Скидка:',PX,y+12*S,Fbody,'#dc3545');
    tx('−'+fmtRub(t.discAmt),PX+CW,y+12*S,Fbody,'#dc3545','right');y+=18*S;
  }
  hl(y,'#212529',2);y+=10*S;
  tx('К оплате:',PX,y+14*S,Fbig,'#198754');
  tx(fmtRub(t.final),PX+CW,y+14*S,Fbig,'#198754','right');y+=22*S;

  if(est.notes){
    chk(40*S);hl(y,'#dee2e6');y+=14*S;
    tx('Примечание:',PX,y+10*S,Fh2,'#555');y+=15*S;
    let rem=est.notes;
    while(rem){const[l,r]=wrap(rem,Fsm,CW);chk(15*S);tx(l,PX,y+10*S,Fsm,'#555');y+=15*S;rem=r;}
  }

  if(isInvoice){
    chk(50*S);y+=24*S;
    const half=CW/2;
    tx('Сдал: ______________________',PX,y+12*S,Fsm,'#333');
    tx('Принял: ____________________',PX+half,y+12*S,Fsm,'#333');
  }
  return pages;
}

async function pagesToPdfBlob(canvases) {
  const jpegs=await Promise.all(canvases.map(c=>new Promise((res,rej)=>
    c.toBlob(b=>b?b.arrayBuffer().then(res):rej(Error('toBlob')),'image/jpeg',0.88)
  )));
  const enc=new TextEncoder(),parts=[],offs={};let pos=0;
  const wr=s=>{const b=enc.encode(s);parts.push(b);pos+=b.length;};
  const wrb=ab=>{const b=new Uint8Array(ab);parts.push(b);pos+=b.byteLength;};
  const obj=id=>{offs[id]=pos;wr(`${id} 0 obj\n`);};
  const PW=595,PH=842,n=canvases.length;
  wr('%PDF-1.4\n%\xFF\xFF\xFF\xFF\n');
  obj(1);wr('<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');
  obj(2);wr(`<< /Type /Pages /Kids [${Array.from({length:n},(_,i)=>3+i*3+' 0 R').join(' ')}] /Count ${n} >>\nendobj\n`);
  for(let i=0;i<n;i++){
    const pi=3+i*3,ci=4+i*3,ii=5+i*3;
    const iw=canvases[i].width,ih=canvases[i].height,jb=jpegs[i];
    obj(pi);wr(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW} ${PH}] /Contents ${ci} 0 R /Resources << /XObject << /Im${i} ${ii} 0 R >> >> >>\nendobj\n`);
    const cs=`q ${PW} 0 0 ${PH} 0 0 cm /Im${i} Do Q`;
    obj(ci);wr(`<< /Length ${cs.length} >>\nstream\n${cs}\nendstream\nendobj\n`);
    obj(ii);wr(`<< /Type /XObject /Subtype /Image /Width ${iw} /Height ${ih} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jb.byteLength} >>\nstream\n`);
    wrb(jb);wr('\nendstream\nendobj\n');
  }
  const xp=pos,tot=2+n*3;
  wr(`xref\n0 ${tot+1}\n0000000000 65535 f \n`);
  for(let i=1;i<=tot;i++)wr(String(offs[i]).padStart(10,'0')+' 00000 n \n');
  wr(`trailer\n<< /Size ${tot+1} /Root 1 0 R >>\nstartxref\n${xp}\n%%EOF\n`);
  const total=parts.reduce((s,p)=>s+p.byteLength,0);
  const res=new Uint8Array(total);let off=0;
  for(const p of parts){res.set(p,off);off+=p.byteLength;}
  return new Blob([res],{type:'application/pdf'});
}

function shareText() {
  const est = load().find(e => e.id === currentId);
  if (!est) return;
  const { t, title } = buildEstimateHtml(est);
  const d = est.dims || {};
  const dims = [d.A&&`Длина: ${d.A}м`, d.B&&`Ширина: ${d.B}м`, d.D&&`Перила: ${d.D}м`, d.C&&`Высота: ${d.C}м`].filter(Boolean).join(', ');
  const lines = est.items.map(it => {
    const wi = WORK_ITEMS.find(w => w.id === it.id);
    if (!wi) return '';
    const tot = getItemLineTotal(wi, it, d);
    const _cp3 = [it.color, it.colorB, it.colorC].filter(Boolean);
    const colorNote = _cp3.length ? ` (${_cp3.join(' / ')})` : '';
    return `• ${wi.name}${colorNote} × ${it.qty} ${wi.unit} = ${fmtRub(tot)}`;
  }).filter(Boolean).join('\n');
  const text = [title, est.client_name||'', est.date||'', dims&&`\n${dims}`, lines&&`\nРаботы:\n${lines}`,
    t.discAmt>0?`\nСкидка: −${fmtRub(t.discAmt)}`:'', `\nК оплате: ${fmtRub(t.final)}`,
    est.notes&&`\n${est.notes}`].filter(Boolean).join('\n');
  const cap = window.Capacitor;
  if (cap && cap.isNativePlatform && cap.isNativePlatform() && cap.Plugins && cap.Plugins.Share) {
    cap.Plugins.Share.share({ title, text, dialogTitle: 'Отправить' });
  } else if (navigator.share) { navigator.share({ title, text }); }
  else { navigator.clipboard && navigator.clipboard.writeText(text); alert('Текст сметы скопирован'); }
}

function fmtRub(v) {

// ── Резервная копия смет (экспорт/импорт файлом) ──
async function exportBackup() {
  const ests = load();
  if (!ests.length) { alert('Смет пока нет'); return; }
  const payload = JSON.stringify({app:'balcony', version:1,
    exported: new Date().toISOString(), count: ests.length, estimates: ests}, null, 2);
  const stamp = new Date().toISOString().slice(0,10);
  const fname = `Балкон-сметы-${stamp}.json`;
  const blob = new Blob([payload], {type:'application/json'});
  try {
    await shareFile(blob, fname, 'application/json', 'Резервная копия смет');
  } catch(e) {
    alert('Не удалось сохранить копию: ' + (e && e.message ? e.message : e));
  }
}

function importBackup(input) {
  const f = input.files && input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    let data;
    try { data = JSON.parse(reader.result); } catch(e) { alert('Не удалось прочитать файл (не JSON)'); input.value=''; return; }
    const incoming = Array.isArray(data) ? data : (data && data.estimates);
    if (!Array.isArray(incoming)) { alert('Это не файл резервной копии смет'); input.value=''; return; }
    // Слияние без потерь: существующие сметы сохраняются, при совпадении id — новой назначается новый id
    const existing = load();
    const ids = new Set(existing.map(e => e.id));
    let added = 0;
    incoming.forEach(e => {
      if (!e || typeof e !== 'object') return;
      let est = {...e};
      if (est.id == null || ids.has(est.id)) est.id = Date.now() + Math.floor(Math.random()*100000);
      ids.add(est.id);
      existing.push(est); added++;
    });
    save(existing);
    input.value='';
    renderList();
    alert(`Восстановлено смет: ${added}. Всего теперь: ${existing.length}.`);
  };
  reader.readAsText(f);
}

// ── Дата: input[type=date] (гггг-мм-дд) ⇄ хранение (дд.мм.гггг) ──
function toInputDate(ddmmyyyy) {
  const m = (ddmmyyyy || '').match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : '';
}
function fromInputDate(yyyymmdd) {
  const m = (yyyymmdd || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m ? `${m[3]}.${m[2]}.${m[1]}` : '';
}

// ── Тёмная тема ──
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  try { localStorage.setItem('theme', next); } catch (e) {}
  applyTheme(next);
}
(function initTheme() {
  let t = 'light';
  try { t = localStorage.getItem('theme') || 'light'; } catch (e) {}
  applyTheme(t);
})();

// ── Логотип компании (data-URI из настроек) ──
let LOGO_IMG = null;
(function initLogo() {
  if (typeof LOGO === 'undefined' || !LOGO) return;
  LOGO_IMG = new Image();
  LOGO_IMG.src = LOGO;                       // предзагрузка для PDF-канваса
  document.querySelectorAll('.app-logo').forEach(img => { img.src = LOGO; img.style.display = ''; });
  const lt = document.getElementById('loginTitle');
  if (lt) lt.style.display = 'none';          // прячем заголовок — есть логотип
})();

// ── Иконка приложения (для «На экран Домой» / вкладки) ──
(function initAppIcon() {
  if (typeof APP_ICON === 'undefined' || !APP_ICON) return;
  const ti = document.getElementById('appTouchIcon'); if (ti) ti.href = APP_ICON;
  const fav = document.getElementById('appFavicon');  if (fav) fav.href = APP_ICON;
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function(e){console.log('SW',e);});
  });
}
</script>
</body>
